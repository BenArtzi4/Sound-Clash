name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/backend/**"
      - "tests/db/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "tests/backend/**"
      - "tests/db/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy app

      - name: Reject coverage pragmas in app code
        run: |
          if grep -rn "pragma:[[:space:]]*no cover" app/; then
            echo "::error::Found 'pragma: no cover' in app code — banned per docs/testing-strategy.md §2"
            exit 1
          fi

      - name: pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90
        # NOTE: ratcheted to 90 at end of Phase 4 per docs/testing-strategy.md §5.
        # Branch coverage tracked but not gated until a later phase.

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  deploy:
    name: deploy (Render)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK not set; skipping deploy"
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
