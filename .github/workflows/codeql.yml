name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    # Weekly scan on Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

# NOTE: this workflow does NOT run on pull_request because CodeQL requires
# "Code scanning" to be enabled in repo Settings → Code security → Code scanning.
# Once that's enabled, you can add `pull_request: { branches: [main] }` back.

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the security-and-quality query suite (broader than default).
          queries: security-and-quality

      # The upload step inside `analyze` will fail until "Code scanning" is
      # enabled in repo Settings → Code security & analysis. Mark as
      # continue-on-error so the workflow stays green; the analysis still runs
      # and surfaces issues in the run log. Remove this once code scanning is on.
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
