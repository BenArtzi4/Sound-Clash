name: E2E

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Run on main pushes, manual dispatch, OR PRs labeled `run-e2e`.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    name: Playwright multi-context
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        working-directory: frontend
        # frontend/package-lock.json is intentionally untracked (see commit
        # 888a5ab: npm 10 esbuild optional-deps bug). Mirror frontend.yml.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      # The e2e runs against a throw-away local Supabase stack (db + PostgREST +
      # Realtime + Auth), spun up fresh per run -- no shared hosted "preview"
      # project, no secrets. config.toml disables the services we don't use
      # (Studio, Storage, Edge Runtime, Analytics, Inbucket) to keep startup
      # fast and avoid flaky containers.
      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations + song seed
        run: |
          set -euo pipefail
          DB_URL="$(supabase status -o env | sed -n 's/^DB_URL="\(.*\)"$/\1/p')"
          ./db/migrate.sh "$DB_URL"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f db/seed/songs.sql

      - name: Export Supabase env for the e2e
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "VITE_SUPABASE_URL=$API_URL"
            echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "VITE_API_URL=http://localhost:8000"
            echo "API_URL=http://localhost:8000"
            echo "ADMIN_PASSWORD=ci-e2e-admin"
          } >> "$GITHUB_ENV"

      - name: Run E2E (chromium)
        working-directory: tests/e2e
        run: npx playwright test --project=chromium

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true

  buzz_race_stress:
    # Heavy stress test (race test 100 consecutive runs).
    # Label-gated: only runs on PRs labeled `run-stress`, or manual dispatch.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-stress')
    name: Buzz race stress (100x)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run race test 100×
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: |
          for i in $(seq 1 100); do
            echo "===== Run $i / 100 ====="
            pytest -x -m stress ../tests/db/test_buzz_in_race.py || exit 1
          done
