<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sound Clash: real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="color-scheme" content="light" />

    <!-- PWA: installable to the home screen, launches standalone (no browser
         chrome). The service worker is registered from main.tsx and caches
         nothing — see frontend/public/sw.js. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Warm the two origins EVERY player hits before they can buzz: the
         Supabase project (join hydrate GETs, the Realtime WebSocket, the buzz
         RPC) and our FastAPI backend (the join POST). Both are reached over
         CORS (supabase-js fetch + WS, our fetch wrapper), so preconnect
         crossorigin. This is the highest-value hint — it overlaps DNS+TLS+TCP
         setup with bundle download and parse. -->
    <link rel="preconnect" href="https://jvfddxuaqcsrguibkymp.supabase.co" crossorigin />
    <link rel="preconnect" href="https://api.soundclash.org" crossorigin />
    <link rel="dns-prefetch" href="https://jvfddxuaqcsrguibkymp.supabase.co" />
    <link rel="dns-prefetch" href="https://api.soundclash.org" />

    <!-- Warm DNS/TLS to YouTube before the IFrame Player mounts on the first
         round (host + display only; the script is still injected by
         YouTubePlayer.tsx). These are non-CORS subresources/embeds: the
         iframe_api script (www.youtube.com), the embed iframe + widget
         postMessage (www.youtube-nocookie.com), the widget JS (s.ytimg.com),
         and thumbnails (i.ytimg.com). preconnect WITHOUT crossorigin — a
         crossorigin socket would sit unused since none of these consumers send
         CORS credentials (the old crossorigin youtube preconnect was dead). -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <link rel="dns-prefetch" href="https://s.ytimg.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.soundclash.org/" />
    <meta property="og:title" content="Sound Clash" />
    <meta
      property="og:description"
      content="Real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />
    <meta property="og:site_name" content="Sound Clash" />

    <!-- Link-preview card for WhatsApp / iMessage / Slack / Discord / X, etc.
         Crawlers fetch this absolute https image and do NOT run JS, so the tag
         must live in the static index.html (the SPA serves it for every route).
         2400x1260 JPEG (2x supersampled, ~135 KB) — the high pixel count keeps
         the card crisp after WhatsApp re-encodes/downscales it, while staying
         well under WhatsApp's ~300 KB render ceiling. Regenerate from
         tools/og-image/ if the brand changes. -->
    <meta property="og:image" content="https://www.soundclash.org/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://www.soundclash.org/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta
      property="og:image:alt"
      content="Sound Clash — real-time multiplayer music trivia buzzer game"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sound Clash" />
    <meta
      name="twitter:description"
      content="Real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />
    <meta name="twitter:image" content="https://www.soundclash.org/og-image.jpg" />
    <meta
      name="twitter:image:alt"
      content="Sound Clash — real-time multiplayer music trivia buzzer game"
    />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%2310b981'/%3E%3Cstop offset='0.5' stop-color='%2306b6d4'/%3E%3Cstop offset='1' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='url(%23g)'%3E%3Crect x='6' y='22' width='10' height='20' rx='3'/%3E%3Crect x='20' y='14' width='10' height='36' rx='3'/%3E%3Crect x='34' y='6' width='10' height='52' rx='3'/%3E%3Crect x='48' y='18' width='10' height='28' rx='3'/%3E%3C/g%3E%3C/svg%3E"
    />
    <title>Sound Clash</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
