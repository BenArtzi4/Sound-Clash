<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sound Clash: real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="color-scheme" content="light" />

    <!-- Warm DNS/TLS to YouTube before the IFrame Player mounts on the first
         round. The script itself is still injected by YouTubePlayer.tsx; we
         just shave the connection setup off the user-perceived song-start
         latency. -->
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sound Clash" />
    <meta
      property="og:description"
      content="Real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />
    <meta property="og:site_name" content="Sound Clash" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sound Clash" />
    <meta
      name="twitter:description"
      content="Real-time multiplayer music trivia. Buzz in, name the tune, win the round."
    />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%2310b981'/%3E%3Cstop offset='0.5' stop-color='%2306b6d4'/%3E%3Cstop offset='1' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='url(%23g)'%3E%3Crect x='6' y='22' width='10' height='20' rx='3'/%3E%3Crect x='20' y='14' width='10' height='36' rx='3'/%3E%3Crect x='34' y='6' width='10' height='52' rx='3'/%3E%3Crect x='48' y='18' width='10' height='28' rx='3'/%3E%3C/g%3E%3C/svg%3E"
    />
    <title>Sound Clash</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
