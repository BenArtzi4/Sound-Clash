# Grafana alerting provisioning for Sound Clash — I-Vitals (T1.7).
#
# Contact point (native Grafana Cloud email) + the #254 "stale buzz-lock
# repairs" alert rule. This is Grafana's file-provisioning format
# (apiVersion 1). The read-only MCP in this repo CANNOT apply it, so use ONE of:
#
#   A) UI import — Alerting → Alert rules → "Import alert rules" (paste YAML), and
#      Alerting → Contact points → "Import" (or create by hand, steps in
#      observability/README.md).
#   B) Provisioning API with an Editor service-account token, e.g.:
#        curl -X POST https://prudentcurrant2518.grafana.net/api/v1/provisioning/contact-points \
#          -H "Authorization: Bearer $EDITOR_TOKEN" -H "Content-Type: application/json" \
#          -H "X-Disable-Provenance: true" -d @<(yq -o=json '.contactPoints[0]' alerting-provisioning.yaml)
#      (rules go to POST /api/v1/provisioning/alert-rules, one per rule object.)
#   C) Mount this file under Grafana's provisioning/alerting/ dir (self-hosted only).
#
# The query below was validated on 2026-07-12 against the live stack: evaluated
# at 20:00 UTC it returned context_game_code 3VX6QJ=3, AJJFJD=2, VHG4S4=2, so the
# gt-2 (i.e. >=3) threshold fires for exactly one game — the real #259 harness
# incident. See observability/README.md.

apiVersion: 1

# --------------------------------------------------------------- contact point
contactPoints:
  - orgId: 1
    name: email-benartzi
    receivers:
      - uid: sc_email_benartzi
        type: email
        disableResolveMessage: false
        settings:
          # Native Grafana Cloud email — no SMTP config needed on Cloud.
          addresses: benartzi4@gmail.com
          singleEmail: false # one notification per firing game_code

# --------------------------------------------------------------- alert rules
groups:
  - orgId: 1
    name: sound-clash-vitals
    folder: Sound Clash
    interval: 5m # evaluate every 5 minutes
    rules:
      - uid: sc_stale_buzz_lock_254
        title: "Sound Clash #254 - stale buzz-lock repairs (>=3 in 30m per game)"
        condition: C
        for: 0m # fire on the first crossing; the burst is already the signal
        noDataState: OK # no repairs == healthy, not "no data" alarm
        execErrState: Error
        labels:
          team: sound-clash
          severity: page
          issue: "254"
        annotations:
          summary: >-
            Game {{ $labels.context_game_code }} self-healed >=3 dropped Realtime
            buzz-lock events in 30m - systemic issue #254 signal.
          description: >-
            Each stale_buzz_lock_resynced is a Realtime lock event a client had to
            recover from a full re-hydrate because the WebSocket frame never
            arrived. A lone one is a flaky phone; >=3 for one game_code in 30m is
            an incident. A matching GitHub issue is filed by the
            stale-buzz-lock-scan workflow. Investigate Supabase Realtime health
            and the game's network conditions.
          runbook_url: https://github.com/BenArtzi4/Sound-Clash/blob/main/observability/README.md
          grafana_explore: >-
            https://prudentcurrant2518.grafana.net/explore?left=%7B%22datasource%22%3A%22grafanacloud-logs%22%2C%22queries%22%3A%5B%7B%22expr%22%3A%22%7Bservice_name%3D%5C%22sound-clash-web%5C%22%2C%20kind%3D%5C%22log%5C%22%7D%20%7C%3D%20%5C%22stale_buzz_lock_resynced%5C%22%20%7C%20logfmt%22%2C%22refId%22%3A%22A%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D
        data:
          - refId: A
            relativeTimeRange:
              from: 1800 # 30m lookback
              to: 0
            datasourceUid: grafanacloud-logs
            model:
              refId: A
              datasource:
                type: loki
                uid: grafanacloud-logs
              expr: 'sum by (context_game_code) (count_over_time({service_name="sound-clash-web", kind="log"} |= "stale_buzz_lock_resynced" | logfmt [30m]))'
              queryType: instant
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: reduce
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [2] # value > 2  ==  >= 3 repairs

# --------------------------------------------------------------- notification policy
# NOT provisioned here on purpose: a provisioned `policies:` block REPLACES the
# whole root notification tree, which would clobber any other routing. Add the
# route by hand instead (Alerting -> Notification policies -> New nested policy):
#   matcher:  team = sound-clash
#   contact point: email-benartzi
#   group by: alertname, context_game_code   (so each game emails separately)
# See observability/README.md for the click-by-click version. If this stack has
# NO other alerts, you may instead just set email-benartzi as the default
# contact point.
