<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sound Clash — Song Curation Review</title>
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="stylesheet" href="review.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <h1>Song Curation Review</h1>
        <div class="counts" id="counts"></div>
      </div>

      <div class="player-bar">
        <div class="player-shell">
          <!-- The YouTube IFrame API replaces this div with its own iframe. -->
          <div id="player"></div>
        </div>
        <div class="player-controls">
          <div id="now-playing" class="now-playing">Click <strong>▶ Load</strong> on a song to preview it.</div>
          <div class="player-buttons">
            <button id="set-start" type="button" disabled>⏱ Set start = current time</button>
            <span id="player-time" class="player-time"></span>
          </div>
          <div id="player-error" class="player-error" role="alert"></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="filters" id="filters">
          <button data-filter="all" class="active" type="button">All</button>
          <button data-filter="pending" type="button">Pending</button>
          <button data-filter="approved" type="button">Approved</button>
          <button data-filter="rejected" type="button">Rejected</button>
          <button data-filter="flagged" type="button">Flagged</button>
        </div>
        <div class="search-box">
          <input id="search" type="search" placeholder="Filter by title / artist / genre…" />
        </div>
        <div class="actions">
          <button id="export-csv" type="button" class="primary">⬇ Export approved CSV</button>
          <button id="reset" type="button" class="danger-ghost">Reset all decisions</button>
        </div>
      </div>
    </header>

    <main id="cards" class="cards"></main>

    <div id="empty" class="empty hidden">
      No <code>window.CANDIDATES</code> found. Generate a batch with
      <code>verify.py</code> and place <code>candidates.js</code> next to this file.
    </div>

    <!-- Per-batch data: window.CANDIDATES = [...]. Generated by verify.py; gitignored.
         Loaded as a plain script (not fetch) so this works from file:// with no server. -->
    <script src="candidates.js" onerror="window.__noCandidates = true"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="review.js"></script>
  </body>
</html>
